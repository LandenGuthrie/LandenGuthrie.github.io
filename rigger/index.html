<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rigger — Web Auto-Rigging Studio</title>
  <link rel="stylesheet" href="css/rigger.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- ===== Left step rail ===== -->
  <aside id="rail">
    <div class="brand"><span class="brand-mark">◆</span><span class="brand-name">RIGGER</span></div>
    <nav id="steps">
      <button class="step" data-step="upload"><span class="dot"></span><span class="label">Upload</span></button>
      <button class="step" data-step="points"><span class="dot"></span><span class="label">Points</span></button>
      <button class="step" data-step="bones"><span class="dot"></span><span class="label">Bones</span></button>
      <button class="step" data-step="weights"><span class="dot"></span><span class="label">Weight Painting</span></button>
      <button class="step" data-step="export"><span class="dot"></span><span class="label">Export</span></button>
    </nav>
  </aside>

  <!-- ===== Main column: top toolbar + viewport ===== -->
  <div id="main">

    <header id="toolbar">
      <div id="tools"></div>
      <div id="nav">
        <button class="back" id="back-btn" disabled>← Back</button>
        <button class="next" id="next-btn" disabled>Next →</button>
      </div>
    </header>

    <main id="stage">
      <div id="viewport"></div>

      <!-- Blender-style view gizmo (top right) -->
      <div id="viewcube">
        <button data-view="front"  title="Front">F</button>
        <button data-view="back"   title="Back">Bk</button>
        <button data-view="right"  title="Right">R</button>
        <button data-view="left"   title="Left">L</button>
        <button data-view="top"    title="Top">T</button>
        <button data-view="bottom" title="Bottom">Bt</button>
      </div>

      <!-- rigging-method overlay (shown right after a model loads) -->
      <div id="methods" hidden></div>

      <!-- reference diagram (shown during the Points step) -->
      <aside id="refpanel" hidden></aside>

      <!-- drop zone for upload step -->
      <div id="dropzone">
        <div class="dz-inner">
          <div class="dz-icon">⬆</div>
          <h2>Drop a 3D model here</h2>
          <p>or click to browse — <b>.glb .gltf .fbx .obj</b></p>
          <button id="browse-btn">Choose file</button>
          <input type="file" id="file-input" accept=".glb,.gltf,.fbx,.obj" hidden>
        </div>
      </div>

      <!-- loading veil -->
      <div id="veil" hidden><div class="spinner"></div><span id="veil-msg">Working…</span></div>
    </main>

  </div>

  <div id="toast"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
