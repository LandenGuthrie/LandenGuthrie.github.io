<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landens Portfolio</title>
  <script>document.documentElement.dataset.theme = localStorage.getItem('theme') || 'light';</script>
  <link rel="stylesheet" href="css/style.css?v=2">
</head>
<body data-page="home">

  <header id="topbar">
    <nav>
      <a href="#hero">Home</a>
      <a href="#projects">Projects</a>
      <a href="#about">About</a>
      <a class="blogs-btn" href="blogs.html">Blogs</a>
    </nav>
    <button class="theme-toggle" id="theme-toggle" aria-label="Switch between light and dark mode">
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5" fill="currentColor" stroke="none"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M19.1 4.9l-1.8 1.8M6.7 17.3l-1.8 1.8"/></svg>
      <svg class="moon" viewBox="0 0 24 24" fill="currentColor"><path d="M21 13.2A9 9 0 1 1 10.8 3a7.2 7.2 0 0 0 10.2 10.2z"/></svg>
    </button>
  </header>

  <main id="slider">
   <div id="slides">

    <!-- Page 1: full screen title -->
    <section class="screen" id="hero">
      <video class="hero-video" autoplay muted loop playsinline
             disablepictureinpicture tabindex="-1" hidden></video>
      <div class="hero-overlay" hidden></div>
      <h1 id="hero-title"></h1>
      <p class="tagline" id="hero-tagline"></p>
      <div class="scroll-hint">Scroll <span class="arrow">&darr;</span></div>
    </section>

    <!-- Page 2: top three projects -->
    <section class="screen" id="projects">
      <div class="section-head">
        <h2 class="section-title reveal">Recent Projects</h2>
        <a class="skip-btn reveal" href="#about">About Me &rarr;</a>
      </div>
      <div class="section-scroll">
        <div class="card-grid" id="featured-grid"></div>
      </div>
    </section>

    <!-- Page 3: about me + links -->
    <section class="screen" id="about">
      <h2 class="section-title reveal">About Me</h2>
      <div class="about-grid">
        <img id="about-img" class="reveal" src="" alt="">
        <div class="about-text" id="about-text"></div>
      </div>
      <div id="home-links"></div>
    </section>

   </div>
  </main>

  <script src="js/site.js?v=2"></script>
</body>
</html>
